name: Build WiOSbar

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish (Standard)
      run: |
        dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:DebugType=none -o ./artifacts/standard

    - name: Publish (Portable)
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=none -o ./artifacts/portable

    - name: Upload Standard Build
      uses: actions/upload-artifact@v4
      with:
        name: WiOSbar-Standard
        path: ./artifacts/standard/WiOSbar.exe
        retention-days: 90

    - name: Upload Portable Build
      uses: actions/upload-artifact@v4
      with:
        name: WiOSbar-Portable
        path: ./artifacts/portable/WiOSbar.exe
        retention-days: 90

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./artifacts/standard/WiOSbar.exe
          ./artifacts/portable/WiOSbar.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
